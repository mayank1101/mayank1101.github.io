title: Mayank Sharma
description: Senior Data Scientist / Applied AI Engineer. 5+ years building production AI systems — NLP, GenAI, RAG, healthcare AI — end to end, from data to deployed model.
url: https://mayank1101.github.io
baseurl: ""
author: Mayank Sharma

# Build settings
markdown: kramdown
highlighter: rouge
theme: null

# Sass settings
sass:
  sass_dir: _sass
  style: compressed

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: python
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

# Collections
collections:
  case_studies:
    output: false
    permalink: /case-studies/:name/

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - case-studies.html
  - case-studies
