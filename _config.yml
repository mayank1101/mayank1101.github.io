title: Mayank Sharma
description: Data Scientist transitioning into Product Management. 4+ years building AI systems — NLP, GenAI, healthcare AI. Moving into PM roles at data-driven companies.
url: https://mayank1101.github.io
baseurl: ""
author: Mayank Sharma

# Build settings
markdown: kramdown
highlighter: rouge
theme: null

# Sass settings
sass:
  sass_dir: _sass
  style: compressed

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: python
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

# Collections
collections:
  case_studies:
    output: true
    permalink: /case-studies/:name/

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
