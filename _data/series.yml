- name: "NLP for Product Managers"
  slug: "nlp"
  description: "NLP powers every chatbot, search engine, and autocomplete you use daily. This series explains how language AI works under the hood, from why language is harder for computers than numbers, to how modern models like ChatGPT actually understand your words."
  accent_color: "green"
  author: "Mayank Sharma"
  order: 1

- name: "Deep Learning for Engineers"
  slug: "deep-learning"
  description: "Deep learning is the engine behind image recognition, voice assistants, and generative AI. This series breaks down how neural networks actually work, no calculus required to follow the ideas."
  accent_color: "purple"
  author: "Mayank Sharma"
  order: 2

- name: "Machine Learning for Engineers"
  slug: "machine-learning"
  description: "Machine learning teaches computers to spot patterns instead of following fixed rules. This series walks through the core ideas of machine learning from how models learn, to why they sometimes get things confidently wrong."
  accent_color: "cyan"
  author: "Mayank Sharma"
  order: 3

